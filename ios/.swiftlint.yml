# SwiftLint 配置（iOS / MusicPlayerApp）。
# 文档：https://github.com/realm/SwiftLint

included:
  - MusicPlayerApp

excluded:
  - MusicPlayerApp/.build
  - Pods

# 默认 opt-in 规则按需开启，避免对 Swift 编译器警告造成双倍告警。
opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - last_where
  - operator_usage_whitespace
  - sorted_first_last
  - toggle_bool
  - yoda_condition

# 关闭若干对 SwiftUI / 跨平台桥接不友好的规则
disabled_rules:
  - trailing_whitespace
  - todo  # 项目正在迁移，TODO 由任务清单统一管理
  - file_length  # 桥接文件 MusicCoreBridge.swift 可能较长

# 强制错误而非警告的关键规则
line_length:
  warning: 140
  error: 200

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 400
  error: 800

file_length:
  warning: 600
  error: 1200

identifier_name:
  min_length: 1
  max_length: 60
  allowed_symbols: ["_"]

reporter: "xcode"
