<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-icon">&#9835;</span>
          <span class="brand-name">MusicPlayer</span>
          <span id="app-version" class="brand-version"></span>
        </div>
        <nav class="nav">
          <button class="nav-item" data-page="search">&#128269;&nbsp;搜索</button>
          <button class="nav-item" data-page="playlist">&#9776;&nbsp;播放列表</button>
          <button class="nav-item" data-page="favorites">&#9733;&nbsp;收藏</button>
          <button class="nav-item" data-page="leaderboard">&#127942;&nbsp;排行榜</button>
          <button class="nav-item" data-page="local">&#128193;&nbsp;本地音乐</button>
          <button class="nav-item" data-page="settings">&#9881;&nbsp;设置</button>
        </nav>
      </aside>

      <main class="content">
        <div id="page-view" class="page-view"></div>
      </main>

      <footer class="player-bar">
        <div class="player-track">
          <div class="player-cover" id="player-cover"></div>
          <div class="player-meta">
            <div class="player-title" id="player-title">未在播放</div>
            <div class="player-artist" id="player-artist">—</div>
          </div>
        </div>

        <div class="player-controls">
          <button class="ctrl-btn" id="btn-prev" title="上一首">&#9198;</button>
          <button class="ctrl-btn ctrl-play" id="btn-play" title="播放/暂停">&#9654;</button>
          <button class="ctrl-btn" id="btn-next" title="下一首">&#9197;</button>
          <div class="progress">
            <span class="time" id="time-current">0:00</span>
            <input type="range" class="progress-bar" id="progress" min="0" max="1000" value="0" />
            <span class="time" id="time-duration">0:00</span>
          </div>
        </div>

        <div class="player-extras">
          <button class="ctrl-btn" id="btn-lyrics" title="歌词">词</button>
          <button class="ctrl-btn" id="btn-mode" data-mode="sequential" title="播放模式">&#8635;</button>
          <div class="volume">
            <span class="vol-icon">&#128264;</span>
            <input type="range" class="volume-bar" id="volume" min="0" max="100" value="80" />
          </div>
        </div>
      </footer>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
